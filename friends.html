<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运塔·首登者 - 好友</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; min-height: 100%; font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #1a1a3e 0%, #0d1b2a 100%); color: #fff; }
        
        .container { max-width: 430px; margin: 0 auto; padding: 20px; }
        
        /* 头部 */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.1); 
            border: none; 
            color: #fff; 
            font-size: 18px;
            cursor: pointer;
        }
        .header-title { font-size: 18px; font-weight: bold; }
        .header-action { 
            padding: 8px 16px; 
            background: rgba(255,215,0,0.2); 
            border: 1px solid #FFD700; 
            border-radius: 20px; 
            color: #FFD700; 
            font-size: 13px;
            cursor: pointer;
        }
        
        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .search-input::placeholder { color: #666; }
        .search-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            position: relative;
        }
        .tab.active { color: #FFD700; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            right: 0;
            height: 2px;
            background: #FFD700;
        }
        .tab-badge {
            display: inline-block;
            min-width: 18px;
            height: 18px;
            background: #ff4757;
            border-radius: 9px;
            font-size: 11px;
            line-height: 18px;
            text-align: center;
            margin-left: 5px;
            padding: 0 5px;
        }
        
        /* 好友列表 */
        .friend-list { display: flex; flex-direction: column; gap: 10px; }
        .friend-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
        }
        .friend-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #2ed573;
            border-radius: 50%;
            border: 2px solid #1a1a3e;
        }
        .friend-avatar.offline::after { background: #666; }
        .friend-info { flex: 1; }
        .friend-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .friend-status { font-size: 12px; color: #888; }
        .friend-status.online { color: #2ed573; }
        .friend-rank { font-size: 11px; color: #FFD700; }
        .friend-actions { display: flex; gap: 8px; }
        .friend-btn {
            padding: 8px 14px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #FFD700;
            border-radius: 15px;
            color: #FFD700;
            font-size: 12px;
            cursor: pointer;
        }
        .friend-btn.chat { background: rgba(78,205,196,0.2); border-color: #4ECDC4; color: #4ECDC4; }
        
        /* 申请列表 */
        .request-list { display: flex; flex-direction: column; gap: 10px; }
        .request-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .request-message { font-size: 12px; color: #888; margin-top: 4px; }
        .request-actions { display: flex; gap: 8px; }
        .request-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .request-btn.accept { background: #2ed573; color: #fff; }
        .request-btn.reject { background: rgba(255,255,255,0.1); color: #888; }
        
        /* 推荐好友 */
        .recommend-section { margin-top: 30px; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .recommend-list { display: flex; flex-direction: column; gap: 10px; }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        .empty-text { font-size: 14px; }
        
        /* 最近玩伴 */
        .recent-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .recent-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .recent-item {
            text-align: center;
            min-width: 70px;
        }
        .recent-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #6366F1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 8px;
        }
        .recent-name { font-size: 12px; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <div class="header-title">好友</div>
            <button class="header-action" onclick="showAddFriend()">+ 添加</button>
        </div>

        <!-- 搜索 -->
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索玩家ID或昵称..." id="searchInput">
            <button class="search-btn" onclick="searchFriend()">搜索</button>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('friends', this)">好友 <span class="tab-badge">12</span></button>
            <button class="tab" onclick="switchTab('requests', this)">申请 <span class="tab-badge">3</span></button>
            <button class="tab" onclick="switchTab('blacklist', this)">黑名单</button>
        </div>

        <!-- 好友列表 -->
        <div class="friend-list" id="friendList">
            <div class="friend-card">
                <div class="friend-avatar">😺</div>
                <div class="friend-info">
                    <div class="friend-name">
                        小明
                        <span class="friend-rank">黄金</span>
                    </div>
                    <div class="friend-status online">🟢 游戏中 · 2v2团战</div>
                </div>
                <div class="friend-actions">
                    <button class="friend-btn chat" onclick="chatFriend('小明')">聊天</button>
                    <button class="friend-btn" onclick="inviteFriend('小明')">邀请</button>
                </div>
            </div>
            
            <div class="friend-card">
                <div class="friend-avatar offline">🐶</div>
                <div class="friend-info">
                    <div class="friend-name">
                        大壮
                        <span class="friend-rank">铂金</span>
                    </div>
                    <div class="friend-status">⚫ 离线 · 2小时前</div>
                </div>
                <div class="friend-actions">
                    <button class="friend-btn chat" onclick="chatFriend('大壮')">聊天</button>
                    <button class="friend-btn" onclick="inviteFriend('大壮')">邀请</button>
                </div>
            </div>
            
            <div class="friend-card">
                <div class="friend-avatar">🐰</div>
                <div class="friend-info">
                    <div class="friend-name">
                        小红
                        <span class="friend-rank">白银</span>
                    </div>
                    <div class="friend-status online">🟢 在线 · 大厅</div>
                </div>
                <div class="friend-actions">
                    <button class="friend-btn chat" onclick="chatFriend('小红')">聊天</button>
                    <button class="friend-btn" onclick="inviteFriend('小红')">邀请</button>
                </div>
            </div>
        </div>

        <!-- 申请列表 -->
        <div class="request-list" id="requestList" style="display:none">
            <div class="request-card">
                <div class="friend-avatar">🦁</div>
                <div class="friend-info">
                    <div class="friend-name">王者之路</div>
                    <div class="request-message">"一起上分吧！"</div>
                </div>
                <div class="request-actions">
                    <button class="request-btn accept" onclick="handleRequest(true, this)">接受</button>
                    <button class="request-btn reject" onclick="handleRequest(false, this)">拒绝</button>
                </div>
            </div>
            
            <div class="request-card">
                <div class="friend-avatar">🦊</div>
                <div class="friend-info">
                    <div class="friend-name">狐狸精</div>
                    <div class="request-message">"刚才配合不错~"</div>
                </div>
                <div class="request-actions">
                    <button class="request-btn accept" onclick="handleRequest(true, this)">接受</button>
                    <button class="request-btn reject" onclick="handleRequest(false, this)">拒绝</button>
                </div>
            </div>
        </div>

        <!-- 最近玩伴 -->
        <div class="recent-section">
            <div class="section-title">🕐 最近一起游戏的玩家</div>
            <div class="recent-list">
                <div class="recent-item" onclick="addRecentFriend('玩家A')">
                    <div class="recent-avatar">🐼</div>
                    <div class="recent-name">玩家A</div>
                </div>
                <div class="recent-item" onclick="addRecentFriend('玩家B')">
                    <div class="recent-avatar">🐨</div>
                    <div class="recent-name">玩家B</div>
                </div>
                <div class="recent-item" onclick="addRecentFriend('玩家C')">
                    <div class="recent-avatar">🐯</div>
                    <div class="recent-name">玩家C</div>
                </div>
            </div>
        </div>

        <!-- 推荐好友 -->
        <div class="recommend-section">
            <div class="section-title">👥 推荐好友</div>
            <div class="recommend-list">
                <div class="friend-card">
                    <div class="friend-avatar">🐸</div>
                    <div class="friend-info">
                        <div class="friend-name">跳跳蛙</div>
                        <div class="friend-status">黄金段位 · 胜率58%</div>
                    </div>
                    <button class="friend-btn" onclick="addFriend('跳跳蛙')">+ 添加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 切换标签
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('friendList').style.display = tab === 'friends' ? 'flex' : 'none';
            document.getElementById('requestList').style.display = tab === 'requests' ? 'flex' : 'none';
        }

        // 搜索好友
        function searchFriend() {
            const keyword = document.getElementById('searchInput').value;
            if (!keyword) {
                alert('请输入搜索内容');
                return;
            }
            alert(`🔍 搜索 "${keyword}"...\n(功能开发中)`);
        }

        // 显示添加好友
        function showAddFriend() {
            const id = prompt('请输入玩家ID:');
            if (id) {
                alert(`📨 已向玩家 ${id} 发送好友申请`);
            }
        }

        // 聊天
        function chatFriend(name) {
            alert(`💬 打开与 ${name} 的聊天窗口\n(功能开发中)`);
        }

        // 邀请游戏
        function inviteFriend(name) {
            alert(`🎮 已向 ${name} 发送游戏邀请！`);
        }

        // 处理申请
        function handleRequest(accept, btn) {
            const card = btn.closest('.request-card');
            if (accept) {
                alert('✅ 已接受好友申请');
            } else {
                alert('❌ 已拒绝好友申请');
            }
            card.remove();
        }

        // 添加最近玩伴
        function addRecentFriend(name) {
            if (confirm(`添加 ${name} 为好友？`)) {
                alert(`📨 已向 ${name} 发送好友申请`);
            }
        }

        // 添加推荐好友
        function addFriend(name) {
            alert(`📨 已向 ${name} 发送好友申请`);
        }
    </script>
</body>
</html>
