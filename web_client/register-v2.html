<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #fff;
        }
        .register-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .logo { text-align: center; font-size: 48px; margin-bottom: 10px; }
        .title { text-align: center; color: #FFD700; font-size: 24px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 30px; }
        
        /* 切换标签 */
        .tab-switch {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-weight: bold;
        }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #aaa; font-size: 12px; margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .input-group input:focus { outline: none; border-color: #FFD700; }
        
        .verify-group { display: flex; gap: 10px; }
        .verify-group input { flex: 1; }
        .verify-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .verify-btn:disabled { background: #444; color: #666; }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: linear-gradient(135deg, #2ed573, #26c281);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
        .login-link a { color: #FFD700; text-decoration: none; }
        
        .error-msg { color: #ff4757; font-size: 12px; margin-top: 5px; display: none; }
        .success-msg { color: #2ed573; font-size: 12px; margin-top: 5px; display: none; }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">🏰</div>
        <div class="title">注册命运塔账号</div>
        <div class="subtitle">手机号/邮箱 + 验证码 双通道注册</div>
        
        <!-- 切换标签 -->
        <div class="tab-switch">
            <div class="tab-btn active" onclick="switchTab('phone')">📱 手机号</div>
            <div class="tab-btn" onclick="switchTab('email')">📧 邮箱</div>
        </div>
        
        <!-- 手机号注册 -->
        <form id="phoneForm" class="form-section active">
            <div class="input-group">
                <label>📱 手机号</label>
                <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11">
                <div class="error-msg" id="phoneError">请输入有效的手机号</div>
            </div>
            
            <div class="input-group">
                <label>🔐 短信验证码</label>
                <div class="verify-group">
                    <input type="text" id="phoneCode" placeholder="6位验证码" maxlength="6">
                    <button type="button" class="verify-btn" id="sendPhoneCode" onclick="sendPhoneVerify()">获取验证码</button>
                </div>
                <div class="error-msg" id="phoneCodeError">验证码错误</div>
                <div class="success-msg" id="phoneCodeSuccess">验证码已发送</div>
            </div>
            
            <div class="input-group">
                <label>🔒 设置密码</label>
                <input type="password" id="phonePassword" placeholder="6-20位密码">
            </div>
            
            <div class="input-group">
                <label>🏷️ 游戏昵称</label>
                <input type="text" id="phoneNickname" placeholder="起个酷炫的名字">
            </div>
            
            <button type="submit" class="submit-btn">🎮 立即注册</button>
        </form>
        
        <!-- 邮箱注册 -->
        <form id="emailForm" class="form-section">
            <div class="input-group">
                <label>📧 邮箱地址</label>
                <input type="email" id="email" placeholder="请输入邮箱">
                <div class="error-msg" id="emailError">请输入有效的邮箱</div>
            </div>
            
            <div class="input-group">
                <label>🔐 邮箱验证码</label>
                <div class="verify-group">
                    <input type="text" id="emailCode" placeholder="6位验证码" maxlength="6">
                    <button type="button" class="verify-btn" id="sendEmailCode" onclick="sendEmailVerify()">获取验证码</button>
                </div>
                <div class="error-msg" id="emailCodeError">验证码错误</div>
                <div class="success-msg" id="emailCodeSuccess">验证码已发送到邮箱</div>
            </div>
            
            <div class="input-group">
                <label>📱 绑定手机号（可选）</label>
                <input type="tel" id="bindPhone" placeholder="用于账号安全">
            </div>
            
            <div class="input-group">
                <label>🔒 设置密码</label>
                <input type="password" id="emailPassword" placeholder="6-20位密码">
            </div>
            
            <div class="input-group">
                <label>🏷️ 游戏昵称</label>
                <input type="text" id="emailNickname" placeholder="起个酷炫的名字">
            </div>
            
            <button type="submit" class="submit-btn">🎮 立即注册</button>
        </form>
        
        <div class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </div>

    <script>
        // 切换注册方式
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));
            
            if(type === 'phone') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('phoneForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('emailForm').classList.add('active');
            }
        }
        
        // ========== 手机号验证码（明天接入短信接口）==========
        function sendPhoneVerify() {
            const phone = document.getElementById('phone').value;
            const phoneError = document.getElementById('phoneError');
            const btn = document.getElementById('sendPhoneCode');
            
            // 验证手机号格式
            const phoneRegex = /^1[3-9]\d{9}$/;
            if(!phoneRegex.test(phone)) {
                phoneError.style.display = 'block';
                return;
            }
            phoneError.style.display = 'none';
            
            // TODO: 明天接入短信接口
            // 调用短信API发送验证码
            // 阿里云短信、腾讯云短信、容联云通讯等
            
            // 模拟发送
            const verifyCode = Math.floor(100000 + Math.random() * 900000).toString();
            console.log(`发送短信验证码到 ${phone}: ${verifyCode}`);
            
            document.getElementById('phoneCodeSuccess').style.display = 'block';
            setTimeout(() => document.getElementById('phoneCodeSuccess').style.display = 'none', 3000);
            
            // 倒计时
            startCountdown(btn);
            
            // 模拟短信到达
            setTimeout(() => {
                alert(`📱 模拟短信\n\n您的验证码是：${verifyCode}\n\n（明天接入真实短信接口）`);
            }, 1000);
        }
        
        // ========== 邮箱验证码 ==========
        function sendEmailVerify() {
            const email = document.getElementById('email').value;
            const emailError = document.getElementById('emailError');
            const btn = document.getElementById('sendEmailCode');
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) {
                emailError.style.display = 'block';
                return;
            }
            emailError.style.display = 'none';
            
            // TODO: 接入邮件API (SendGrid/Resend)
            const verifyCode = Math.floor(100000 + Math.random() * 900000).toString();
            console.log(`发送邮件验证码到 ${email}: ${verifyCode}`);
            
            document.getElementById('emailCodeSuccess').style.display = 'block';
            setTimeout(() => document.getElementById('emailCodeSuccess').style.display = 'none', 3000);
            
            startCountdown(btn);
            
            setTimeout(() => {
                alert(`📧 模拟邮件\n\n您的验证码是：${verifyCode}`);
            }, 1000);
        }
        
        // 倒计时
        function startCountdown(btn) {
            let countdown = 60;
            btn.disabled = true;
            btn.textContent = `${countdown}s`;
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}s`;
                if(countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }
        
        // 手机号注册提交
        document.getElementById('phoneForm').onsubmit = function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('phonePassword').value;
            const nickname = document.getElementById('phoneNickname').value;
            
            // 注册用户
            const user = {
                id: Date.now(),
                phone: phone,
                nickname: nickname,
                gold: 1000,
                diamond: 0,
                vip: false,
                registerType: 'phone'
            };
            
            saveUser(user);
        };
        
        // 邮箱注册提交
        document.getElementById('emailForm').onsubmit = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('emailPassword').value;
            const nickname = document.getElementById('emailNickname').value;
            const bindPhone = document.getElementById('bindPhone').value;
            
            const user = {
                id: Date.now(),
                email: email,
                phone: bindPhone,
                nickname: nickname,
                gold: 1000,
                diamond: 0,
                vip: false,
                registerType: 'email'
            };
            
            saveUser(user);
        };
        
        function saveUser(user) {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // 检查是否已注册
            if(user.phone && users.find(u => u.phone === user.phone)) {
                alert('❌ 该手机号已注册');
                return;
            }
            if(user.email && users.find(u => u.email === user.email)) {
                alert('❌ 该邮箱已注册');
                return;
            }
            
            users.push(user);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            alert(`🎉 注册成功！\n\n欢迎 ${user.nickname} 加入命运塔！\n\n🎁 新用户礼包：1000金币已到账！`);
            location.href = 'playable.html';
        }
    </script>
</body>
</html>
