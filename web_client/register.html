<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #fff;
        }
        .register-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
        }
        .title {
            text-align: center;
            color: #FFD700;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .verify-group {
            display: flex;
            gap: 10px;
        }
        .verify-group input {
            flex: 1;
        }
        .verify-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .verify-btn:disabled {
            background: #444;
            color: #666;
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2ed573, #26c281);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
        .login-link a {
            color: #FFD700;
            text-decoration: none;
        }
        .error-msg {
            color: #ff4757;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .success-msg {
            color: #2ed573;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">🏰</div>
        <div class="title">注册命运塔账号</div>
        
        <form id="registerForm">
            <div class="input-group">
                <label>📧 邮箱（必填）</label>
                <input type="email" id="email" placeholder="请输入邮箱地址" required>
                <div class="error-msg" id="emailError">请输入有效的邮箱地址</div>
            </div>
            
            <div class="input-group">
                <label>🔐 验证码</label>
                <div class="verify-group">
                    <input type="text" id="verifyCode" placeholder="6位验证码" maxlength="6">
                    <button type="button" class="verify-btn" id="sendCodeBtn" onclick="sendVerifyCode()">获取验证码</button>
                </div>
                <div class="error-msg" id="codeError">验证码错误</div>
                <div class="success-msg" id="codeSuccess">验证码已发送，请查收邮件</div>
            </div>
            
            <div class="input-group">
                <label>📱 手机号（选填）</label>
                <input type="tel" id="phone" placeholder="绑定手机更安全（可选）">
            </div>
            
            <div class="input-group">
                <label>🔒 设置密码</label>
                <input type="password" id="password" placeholder="6-20位密码" minlength="6" maxlength="20" required>
            </div>
            
            <div class="input-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="再次输入密码" required>
                <div class="error-msg" id="pwdError">两次输入的密码不一致</div>
            </div>
            
            <div class="input-group">
                <label>🏷️ 游戏昵称</label>
                <input type="text" id="nickname" placeholder="起个酷炫的名字" maxlength="12" required>
            </div>
            
            <button type="submit" class="submit-btn">🎮 立即注册</button>
        </form>
        
        <div class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </div>

    <script>
        // 模拟验证码存储（实际应该存后端）
        let currentVerifyCode = '';
        let countdown = 0;
        
        // 发送验证码
        function sendVerifyCode() {
            const email = document.getElementById('email').value;
            const emailError = document.getElementById('emailError');
            const codeSuccess = document.getElementById('codeSuccess');
            const btn = document.getElementById('sendCodeBtn');
            
            // 验证邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) {
                emailError.style.display = 'block';
                return;
            }
            emailError.style.display = 'none';
            
            // 生成6位验证码
            currentVerifyCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            // 模拟发送邮件
            console.log(`发送验证码到 ${email}: ${currentVerifyCode}`);
            
            // 显示成功消息
            codeSuccess.style.display = 'block';
            setTimeout(() => codeSuccess.style.display = 'none', 3000);
            
            // 开始倒计时
            countdown = 60;
            btn.disabled = true;
            btn.textContent = `${countdown}s`;
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}s`;
                if(countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
            
            // 实际生产环境应该调用邮件API
            // 这里用alert模拟邮件到达
            setTimeout(() => {
                alert(`📧 模拟邮件\n\n您的验证码是：${currentVerifyCode}\n\n（实际生产环境会发送真实邮件）`);
            }, 1000);
        }
        
        // 表单提交
        document.getElementById('registerForm').onsubmit = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const verifyCode = document.getElementById('verifyCode').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const nickname = document.getElementById('nickname').value;
            
            // 验证
            if(verifyCode !== currentVerifyCode) {
                document.getElementById('codeError').style.display = 'block';
                return;
            }
            document.getElementById('codeError').style.display = 'none';
            
            if(password !== confirmPassword) {
                document.getElementById('pwdError').style.display = 'block';
                return;
            }
            document.getElementById('pwdError').style.display = 'none';
            
            // 注册用户（模拟）
            const user = {
                id: Date.now(),
                email,
                nickname,
                phone: document.getElementById('phone').value,
                createdAt: new Date().toISOString(),
                gold: 1000, // 新用户送1000金币
                diamond: 0,
                vip: false
            };
            
            // 存储到localStorage（实际应该存后端数据库）
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // 检查邮箱是否已注册
            if(users.find(u => u.email === email)) {
                alert('❌ 该邮箱已注册！');
                return;
            }
            
            users.push(user);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            alert(`🎉 注册成功！\n\n欢迎 ${nickname} 加入命运塔！\n\n🎁 新用户礼包：1000金币已到账！`);
            
            // 跳转到游戏
            location.href = 'playable.html';
        };
    </script>
</body>
</html>
