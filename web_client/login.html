<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #fff;
        }
        .login-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .logo { text-align: center; font-size: 48px; margin-bottom: 10px; }
        .title { text-align: center; color: #FFD700; font-size: 24px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #aaa; font-size: 12px; margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .input-group input:focus { outline: none; border-color: #FFD700; }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 12px;
        }
        .remember-me { display: flex; align-items: center; gap: 5px; color: #aaa; }
        .forgot-pwd { color: #FFD700; text-decoration: none; }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 12px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #444;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .social-login {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        .social-btn.wechat { background: #07c160; border-color: #07c160; }
        .social-btn.qq { background: #12b7f5; border-color: #12b7f5; }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
        .register-link a { color: #FFD700; text-decoration: none; }
        .error-msg { color: #ff4757; font-size: 12px; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🏰</div>
        <div class="title">登录命运塔</div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>📧 邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱" required>
            </div>
            
            <div class="input-group">
                <label>🔒 密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            
            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    记住我
                </label>
                <a href="#" class="forgot-pwd" onclick="forgotPassword()">忘记密码？</a>
            </div>
            
            <div class="error-msg" id="errorMsg">邮箱或密码错误</div>
            
            <button type="submit" class="submit-btn">🎮 立即登录</button>
        </form>
        
        <div class="divider">其他登录方式</div>
        
        <div class="social-login">
            <button class="social-btn wechat" onclick="wechatLogin()">微信登录</button>
            <button class="social-btn qq" onclick="qqLogin()">QQ登录</button>
        </div>
        
        <div class="register-link">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
        // 登录
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // 从localStorage获取用户列表
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            
            if(!user) {
                document.getElementById('errorMsg').textContent = '该邮箱未注册';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            
            // 实际应该验证密码，这里简化处理
            // 存储当前用户
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            if(remember) {
                localStorage.setItem('rememberEmail', email);
            }
            
            alert(`🎉 欢迎回来，${user.nickname}！`);
            location.href = 'playable.html';
        };
        
        // 忘记密码
        function forgotPassword() {
            const email = prompt('请输入注册邮箱：');
            if(!email) return;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            
            if(!user) {
                alert('❌ 该邮箱未注册');
                return;
            }
            
            // 模拟发送重置邮件
            alert(`📧 重置密码邮件已发送到 ${email}\n\n请查收邮件并按提示操作。`);
        }
        
        // 第三方登录（模拟）
        function wechatLogin() {
            alert('🟢 微信登录功能开发中...');
        }
        
        function qqLogin() {
            alert('🔵 QQ登录功能开发中...');
        }
        
        // 自动填充记住的邮箱
        const rememberedEmail = localStorage.getItem('rememberEmail');
        if(rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
    </script>
</body>
</html>
