<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球锦标赛 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, rgba(26,26,62,0.75), rgba(13,27,42,0.8)),
                        url('https://raw.githubusercontent.com/griffithjin/toweroffate-v1/main/assets/towers/tokyo-tower.png') center center / cover no-repeat;
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { color: #fff; text-decoration: none; font-size: 16px; }
        .header-title { color: #fff; font-size: 18px; font-weight: bold; }
        
        /* 世界地图区域 */
        .world-map {
            padding: 20px;
            text-align: center;
        }
        .map-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 大洲选择 */
        .continents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .continent-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        .continent-card:hover {
            border-color: #ffd700;
            transform: scale(1.02);
        }
        .continent-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .continent-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .continent-countries {
            font-size: 12px;
            color: #aaa;
        }
        
        /* 国家列表 */
        .countries-section {
            padding: 20px;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .countries-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .country-tag {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .country-tag:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.05);
        }
        .country-tag .flag {
            font-size: 18px;
        }
        
        /* 当前锦标赛 */
        .current-tournament {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 20px;
            padding: 20px;
            border-radius: 16px;
        }
        .tournament-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .tournament-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .tournament-prize {
            font-size: 24px;
            color: #ffd700;
        }
        .join-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* 排行榜 */
        .leaderboard {
            padding: 20px;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .rank-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }
        .rank-number.top3 { background: linear-gradient(135deg, #C0C0C0, #808080); }
        .player-info {
            flex: 1;
        }
        .player-name {
            font-weight: bold;
        }
        .player-country {
            font-size: 12px;
            color: #aaa;
        }
        .player-score {
            font-size: 18px;
            color: #ffd700;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← 返回</a>
        <div class="header-title">全球锦标赛</div>
        <div></div>
    </div>
    
    <div class="world-map">
        <div class="map-title">🏆 选择你的战场</div>
    </div>
    
    <!-- 大洲选择 -->
    <div class="continents-grid">
        <div class="continent-card" onclick="showCountries('asia')">
            <div class="continent-icon">🌏</div>
            <div class="continent-name">亚洲</div>
            <div class="continent-countries">49个国家</div>
        </div>
        
        <div class="continent-card" onclick="showCountries('europe')">
            <div class="continent-icon">🏰</div>
            <div class="continent-name">欧洲</div>
            <div class="continent-countries">44个国家</div>
        </div>
        
        <div class="continent-card" onclick="showCountries('america')">
            <div class="continent-icon">🗽</div>
            <div class="continent-name">美洲</div>
            <div class="continent-countries">35个国家</div>
        </div>
        
        <div class="continent-card" onclick="showCountries('africa')">
            <div class="continent-icon">🦁</div>
            <div class="continent-name">非洲</div>
            <div class="continent-countries">54个国家</div>
        </div>
    </div>
    
    <!-- 当前锦标赛 -->
    <div class="current-tournament">
        <div class="tournament-title">🔥 中国锦标赛 - 上海站</div>
        <div class="tournament-info">
            <div>
                <div style="font-size: 14px; opacity: 0.8;">参赛人数</div>
                <div style="font-size: 20px; font-weight: bold;">1,234人</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 14px; opacity: 0.8;">奖池</div>
                <div class="tournament-prize">💎 5000</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex: 1; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size: 12px; opacity: 0.7;">当前层数</div>
                <div style="font-size: 18px; font-weight: bold;">第 7 层</div>
            </div>
            <div style="flex: 1; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size: 12px; opacity: 0.7;">剩余时间</div>
                <div style="font-size: 18px; font-weight: bold;">02:45:12</div>
            </div>
        </div>
        
        <button class="join-btn" onclick="joinTournament()">立即参赛</button>
    </div>
    
    <!-- 排行榜 -->
    <div class="leaderboard">
        <div class="section-title">🏅 全球排行榜</div>
        
        <div class="leaderboard-item">
            <div class="rank-number">1</div>
            <img src="assets/avatars/china-dragon.png" style="width: 40px; height: 40px; border-radius: 50%;">
            <div class="player-info">
                <div class="player-name">龙霸天下</div>
                <div class="player-country">🇨🇳 中国</div>
            </div>
            <div class="player-score">12,580</div>
        </div>
        
        <div class="leaderboard-item">
            <div class="rank-number top3">2</div>
            <img src="assets/avatars/france-romantic.png" style="width: 40px; height: 40px; border-radius: 50%;">
            <div class="player-info">
                <div class="player-name">巴黎绅士</div>
                <div class="player-country">🇫🇷 法国</div>
            </div>
            <div class="player-score">11,234</div>
        </div>
        
        <div class="leaderboard-item">
            <div class="rank-number top3">3</div>
            <img src="assets/avatars/usa-cowboy.png" style="width: 40px; height: 40px; border-radius: 50%;">
            <div class="player-info">
                <div class="player-name">德州牛仔</div>
                <div class="player-country">🇺🇸 美国</div>
            </div>
            <div class="player-score">10,876</div>
        </div>
    </div>
    
    <script>
        function showCountries(continent) {
            alert('加载' + continent + '国家列表...');
        }
        
        function joinTournament() {
            alert('正在进入锦标赛...');
            // 跳转到游戏页面
            location.href = 'playable.html?tournament=china';
        }
    </script>
</body>
</html>
