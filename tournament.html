<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>全球锦标赛 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* ===== 通用样式 ===== */
        .hidden { display: none !important; }
        
        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(255,107,53,0.3);
        }
        .back-btn { color: #fff; text-decoration: none; font-size: 16px; display: flex; align-items: center; gap: 5px; transition: transform 0.3s; }
        .back-btn:hover { transform: translateX(-3px); }
        .header-title { color: #fff; font-size: 18px; font-weight: bold; }
        
        /* ===== 倒计时组件样式 ===== */
        .countdown-section {
            margin: 20px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(102,126,234,0.9), rgba(118,75,162,0.9));
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(102,126,234,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .countdown-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .countdown-time {
            font-size: 48px;
            font-weight: bold;
            font-family: 'SF Mono', Monaco, monospace;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
            animation: pulse 1s ease-in-out infinite;
            white-space: nowrap;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .countdown-progress {
            margin-top: 20px;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .countdown-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            border-radius: 4px;
            transition: width 1s linear;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .countdown-status {
            margin-top: 10px;
            font-size: 13px;
            opacity: 0.8;
        }
        
        /* ===== 报名队列系统样式 ===== */
        .queue-section {
            margin: 20px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .queue-title {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .queue-count {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .queue-count.full {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            animation: glow 1.5s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 480px) {
            .players-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .countdown-time { font-size: 32px; }
        }
        .player-avatar {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent;
        }
        .player-avatar.human {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #ffd700;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .player-avatar.bot {
            background: linear-gradient(135deg, #4a5568, #2d3748);
            border-color: #718096;
            opacity: 0.7;
        }
        .player-avatar.bot::after {
            content: '🤖';
            font-size: 12px;
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #1a202c;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-avatar.empty {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
        }
        .player-avatar.joining {
            animation: joinPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes joinPop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            70% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .player-avatar.leaving {
            animation: leavePop 0.4s ease-in forwards;
        }
        @keyframes leavePop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0) rotate(180deg); opacity: 0; }
        }
        
        /* ===== 报名按钮样式 ===== */
        .register-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .register-btn.idle {
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            color: #000;
            box-shadow: 0 4px 20px rgba(255,215,0,0.4);
        }
        .register-btn.idle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255,215,0,0.5);
        }
        .register-btn.registered {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: #fff;
        }
        .register-btn.ingame {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: #fff;
            cursor: not-allowed;
            animation: pulse-blue 2s ease-in-out infinite;
        }
        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 0 0 0 rgba(66,153,225,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(66,153,225,0); }
        }
        
        /* ===== 奖励预览样式 ===== */
        .rewards-section {
            margin: 20px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .rewards-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .reward-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        .reward-card.gold { border-color: rgba(255,215,0,0.3); }
        .reward-card.silver { border-color: rgba(192,192,192,0.3); }
        .reward-card.bronze { border-color: rgba(205,127,50,0.3); }
        .reward-card:hover { transform: translateY(-8px) scale(1.02); }
        .reward-icon { font-size: 48px; margin-bottom: 10px; }
        .reward-rank { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .reward-card.gold .reward-rank { color: #ffd700; }
        .reward-card.silver .reward-rank { color: #c0c0c0; }
        .reward-card.bronze .reward-rank { color: #cd7f32; }
        .reward-amount { font-size: 20px; font-weight: bold; color: #fff; }
        
        /* ===== 世界地图区域 ===== */
        .world-map { padding: 20px; text-align: center; }
        .map-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 大洲选择 */
        .continents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .continent-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        .continent-card:hover {
            border-color: #ffd700;
            transform: scale(1.02);
        }
        .continent-icon { font-size: 48px; margin-bottom: 10px; }
        .continent-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .continent-countries { font-size: 12px; color: #aaa; }
        
        /* 国家选择弹窗 */
        .country-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .country-modal.show { display: flex; }
        .country-modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid rgba(255,215,0,0.3);
        }
        .country-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .country-modal-title { font-size: 20px; font-weight: bold; }
        .country-modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .countries-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .country-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .country-item:hover {
            background: rgba(255,215,0,0.1);
            transform: translateX(5px);
        }
        .country-flag { font-size: 24px; }
        .country-info { flex: 1; }
        .country-name { font-weight: bold; font-size: 14px; }
        .country-difficulty { font-size: 11px; color: #aaa; }
        
        /* ===== 锦标赛游戏主界面 ===== */
        .tournament-game-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            z-index: 2000;
            flex-direction: column;
        }
        .tournament-game-container.active { display: flex; }
        
        /* 游戏顶部栏 */
        .game-top-bar {
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .game-info { display: flex; align-items: center; gap: 15px; }
        .game-tower-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        .game-tower-flag { font-size: 20px; }
        
        /* 双计时器 */
        .game-timers {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .timer-box {
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            text-align: center;
        }
        .timer-label { font-size: 9px; opacity: 0.8; }
        .timer-value {
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            font-weight: bold;
        }
        .timer-value.warning { color: #ff4757; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* 团队战标题 */
        .team-battle-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 15px;
            background: linear-gradient(90deg, rgba(255,71,79,0.9) 0%, rgba(30,30,50,0.95) 30%, rgba(30,30,50,0.95) 70%, rgba(52,152,219,0.9) 100%);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }
        .team-section { display: flex; align-items: center; gap: 8px; }
        .team-panda .team-name { color: #ff6b6b; font-size: 12px; font-weight: bold; }
        .team-wolf .team-name { color: #4dabf7; font-size: 12px; font-weight: bold; }
        .team-avatars { display: flex; gap: 3px; }
        .team-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid;
        }
        .team-panda .team-avatar { border-color: #ff6b6b; background: linear-gradient(135deg, #ff6b6b, #c0392b); }
        .team-wolf .team-avatar { border-color: #4dabf7; background: linear-gradient(135deg, #4dabf7, #2980b9); }
        .vs-badge {
            font-size: 14px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            padding: 3px 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid #FFD700;
        }
        
        /* 主战场 */
        .battlefield {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        
        /* 左侧层叠区 */
        .layer-panel {
            width: 22%;
            min-width: 80px;
            max-width: 110px;
            background: linear-gradient(180deg, rgba(20,20,40,0.95) 0%, rgba(30,30,60,0.9) 100%);
            border-right: 2px solid rgba(255,215,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .layer-panel-title {
            text-align: center;
            padding: 8px 3px;
            font-size: 11px;
            color: #FFD700;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            font-weight: bold;
        }
        .layer-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 3px;
            overflow-y: auto;
        }
        .layer-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 4px;
            margin: 1px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            min-height: 22px;
        }
        .layer-item.current {
            background: linear-gradient(90deg, rgba(255,215,0,0.4), rgba(255,165,0,0.3));
            border: 2px solid #FFD700;
            box-shadow: 0 0 12px rgba(255,215,0,0.5);
            animation: layer-pulse 1.5s ease-in-out infinite;
        }
        @keyframes layer-pulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
            50% { box-shadow: 0 0 16px rgba(255,215,0,0.7); }
        }
        .layer-rank { width: 20px; text-align: center; }
        .layer-item[data-rank="A"] .layer-rank { color: #FFD700; font-size: 14px; }
        .layer-item[data-rank="K"] .layer-rank { color: #C0C0C0; }
        .layer-item[data-rank="Q"] .layer-rank { color: #CD7F32; }
        .layer-players { display: flex; flex-wrap: wrap; gap: 1px; justify-content: flex-end; }
        .layer-player-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            border: 1px solid;
        }
        .layer-player-icon.self { border-color: #00ff00; box-shadow: 0 0 6px rgba(0,255,0,0.9); width: 16px; height: 16px; font-size: 9px; }
        .layer-player-icon.panda-team { background: linear-gradient(135deg, #ff6b6b, #c0392b); border-color: #ff6b6b; }
        .layer-player-icon.wolf-team { background: linear-gradient(135deg, #4dabf7, #2980b9); border-color: #4dabf7; }
        
        /* 中间塔区 */
        .tower-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: linear-gradient(180deg, rgba(15,15,35,0.9) 0%, rgba(25,25,50,0.8) 100%);
        }
        .tower-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .tower-image {
            max-height: 85%;
            max-width: 80%;
            object-fit: contain;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.6));
            opacity: 0.7;
        }
        .tower-emoji {
            font-size: 120px;
            opacity: 0.5;
        }
        
        /* 当前守卫显示 */
        .current-guard-display {
            position: absolute;
            bottom: 15px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,71,79,0.6);
            border-radius: 8px;
            padding: 6px 8px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .current-guard-label { font-size: 9px; color: #aaa; margin-bottom: 3px; }
        .current-guard-card {
            width: 32px;
            height: 44px;
            background: linear-gradient(135deg, #1a1a3e, #2d2d5a);
            border: 1px solid #FFD700;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin: 0 auto;
        }
        .current-guard-card.red { color: #d00; }
        .current-guard-card.black { color: #888; }
        .guard-remaining { font-size: 9px; color: #FFD700; margin-top: 3px; }
        
        /* 右侧激怒牌区 */
        .provoke-panel {
            width: 26%;
            min-width: 100px;
            max-width: 140px;
            background: linear-gradient(180deg, rgba(40,10,10,0.95) 0%, rgba(60,15,15,0.9) 100%);
            border-left: 2px solid rgba(255,71,79,0.4);
            display: flex;
            flex-direction: column;
        }
        .provoke-panel-title {
            text-align: center;
            padding: 8px 3px;
            font-size: 10px;
            color: #ff6b6b;
            border-bottom: 1px solid rgba(255,71,79,0.3);
            font-weight: bold;
        }
        .provoke-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 3px;
            overflow-y: auto;
        }
        .provoke-layer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 2px;
            margin: 1px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            min-height: 22px;
        }
        .provoke-layer.current {
            background: linear-gradient(90deg, rgba(255,0,0,0.5), rgba(200,0,0,0.4));
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255,0,0,0.6);
            animation: provoke-pulse 0.8s infinite;
        }
        @keyframes provoke-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,0,0,0.8); }
        }
        .provoke-card {
            width: 20px;
            height: 28px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            border: 1px solid;
        }
        .provoke-card.red { color: #d00; border-color: #ff6b6b; }
        .provoke-card.black { color: #000; border-color: #666; }
        .provoke-card .suit { font-size: 10px; }
        .provoke-card .rank { font-size: 7px; font-weight: bold; }
        
        /* 底部区域 */
        .bottom-area {
            background: linear-gradient(180deg, #1a1a3e 0%, #0f0f1e 100%);
            border-top: 2px solid #333;
            padding: 8px;
            flex-shrink: 0;
        }
        .player-status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255,215,0,0.1);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .player-status { display: flex; align-items: center; gap: 10px; }
        .player-avatar-main {
            width: 36px;
            height: 36px;
            border-radius: 50%;

    <script>
        // ============ 配置参数 ============
        const CONFIG = {
            COUNTDOWN_DURATION: 120,
            MAX_PLAYERS: 10,
            INITIAL_BOTS: 7,
            BOT_REFILL_DELAY: 120000,
            SIMULATION_INTERVAL: 3000,
        };
        
        // ============ 国家数据 ============
        const COUNTRIES = {
            asia: [
                { code: 'china', name: '中国', flag: '🇨🇳', tower: '东方明珠', difficulty: 'normal' },
                { code: 'japan', name: '日本', flag: '🇯🇵', tower: '东京塔', difficulty: 'normal' },
                { code: 'south_korea', name: '韩国', flag: '🇰🇷', tower: 'N首尔塔', difficulty: 'normal' },
                { code: 'india', name: '印度', flag: '🇮🇳', tower: '印度门', difficulty: 'hard' },
                { code: 'thailand', name: '泰国', flag: '🇹🇭', tower: '郑王庙', difficulty: 'easy' },
                { code: 'singapore', name: '新加坡', flag: '🇸🇬', tower: '鱼尾狮', difficulty: 'easy' },
            ],
            europe: [
                { code: 'france', name: '法国', flag: '🇫🇷', tower: '埃菲尔铁塔', difficulty: 'normal' },
                { code: 'italy', name: '意大利', flag: '🇮🇹', tower: '比萨斜塔', difficulty: 'easy' },
                { code: 'uk', name: '英国', flag: '🇬🇧', tower: '大本钟', difficulty: 'normal' },
                { code: 'germany', name: '德国', flag: '🇩🇪', tower: '科隆大教堂', difficulty: 'hard' },
                { code: 'russia', name: '俄罗斯', flag: '🇷🇺', tower: '克里姆林宫', difficulty: 'hard' },
            ],
            america: [
                { code: 'usa', name: '美国', flag: '🇺🇸', tower: '自由女神像', difficulty: 'normal' },
                { code: 'brazil', name: '巴西', flag: '🇧🇷', tower: '基督像', difficulty: 'normal' },
                { code: 'canada', name: '加拿大', flag: '🇨🇦', tower: 'CN塔', difficulty: 'easy' },
                { code: 'mexico', name: '墨西哥', flag: '🇲🇽', tower: '玛雅金字塔', difficulty: 'hard' },
            ],
            africa: [
                { code: 'egypt', name: '埃及', flag: '🇪🇬', tower: '金字塔', difficulty: 'hard' },
                { code: 'south_africa', name: '南非', flag: '🇿🇦', tower: '桌山', difficulty: 'normal' },
                { code: 'morocco', name: '摩洛哥', flag: '🇲🇦', tower: '哈桑塔', difficulty: 'easy' },
            ]
        };
        
        // ============ 状态管理 ============
        const state = {
            timeRemaining: CONFIG.COUNTDOWN_DURATION,
            isRunning: true,
            players: [],
            bots: CONFIG.INITIAL_BOTS,
            humans: 3,
            userRegistered: false,
            inGame: false,
            lastHumanJoined: null,
            selectedCountry: null,
        };
        
        const AVATARS = ['🐲', '🦁', '🦅', '🐯', '🐺', '🦊', '🐼', '🐨', '🐸', '🦉'];
        
        // ============ 初始化 ============
        function init() {
            initPlayers();
            startCountdown();
            renderPlayers();
            startSimulation();
            updateQueueCount();
            updateCountdownDisplay();
        }
        
        function initPlayers() {
            state.players = [];
            for (let i = 0; i < state.humans; i++) {
                state.players.push({
                    id: i,
                    type: 'human',
                    avatar: AVATARS[i],
                    name: `玩家${i + 1}`
                });
            }
            for (let i = 0; i < state.bots; i++) {
                state.players.push({
                    id: state.humans + i,
                    type: 'bot',
                    avatar: '🤖',
                    name: `Bot${i + 1}`
                });
            }
        }
        
        // ============ 倒计时系统 ============
        function startCountdown() {
            const timer = setInterval(() => {
                if (!state.isRunning) return;
                state.timeRemaining--;
                if (state.timeRemaining <= 0) {
                    state.timeRemaining = CONFIG.COUNTDOWN_DURATION;
                    onRoundStart();
                }
                updateCountdownDisplay();
            }, 1000);
        }
        
        function updateCountdownDisplay() {
            const minutes = Math.floor(state.timeRemaining / 60);
            const seconds = state.timeRemaining % 60;
            document.getElementById('countdownTime').textContent = 
                `报名剩余 ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            const progress = ((CONFIG.COUNTDOWN_DURATION - state.timeRemaining) / CONFIG.COUNTDOWN_DURATION) * 100;
            document.getElementById('countdownProgress').style.width = `${progress}%`;
            
            const humanCount = state.players.filter(p => p.type === 'human').length;
            const botCount = state.players.filter(p => p.type === 'bot').length;
            document.getElementById('countdownStatus').textContent = 
                `当前${humanCount}真人+${botCount}Bot | 满10人立即开赛`;
        }
        
        function onRoundStart() {
            fillWithBots();
            if (state.userRegistered) {
                state.inGame = true;
                updateRegisterButton();
                showNotification('🎮 比赛开始！');
            }
        }
        
        function fillWithBots() {
            const botsNeeded = CONFIG.MAX_PLAYERS - state.players.length;
            if (botsNeeded > 0) {
                for (let i = 0; i < botsNeeded; i++) {
                    state.players.push({
                        id: Date.now() + Math.random(),
                        type: 'bot',
                        avatar: '🤖',
                        name: `Bot${state.bots + i + 1}`
                    });
                }
                state.bots += botsNeeded;
                renderPlayers();
                updateQueueCount();
            }
        }
        
        // ============ 玩家队列渲染 ============
        function renderPlayers() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            for (let i = 0; i < CONFIG.MAX_PLAYERS; i++) {
                const player = state.players[i];
                const avatar = document.createElement('div');
                avatar.className = 'player-avatar';
                if (player) {
                    avatar.classList.add(player.type);
                    avatar.textContent = player.avatar;
                    avatar.title = player.name;
                } else {
                    avatar.classList.add('empty');
                    avatar.innerHTML = '<span style="opacity:0.3">+</span>';
                }
                grid.appendChild(avatar);
            }
        }
        
        function updateQueueCount() {
            const totalPlayers = state.players.length;
            const countEl = document.getElementById('queueCount');
            countEl.textContent = `${totalPlayers}/${CONFIG.MAX_PLAYERS}`;
            countEl.classList.toggle('full', totalPlayers >= CONFIG.MAX_PLAYERS);
        }
        
        // ============ 报名按钮功能 ============
        function toggleRegistration() {
            if (state.inGame) return;
            state.userRegistered = !state.userRegistered;
            if (state.userRegistered) {
                addHumanPlayer('我', '😎');
                showNotification('✅ 报名成功！请选择战场');
            } else {
                removePlayerByName('我');
                showNotification('❌ 已取消报名');
            }
            updateRegisterButton();
            renderPlayers();
            updateQueueCount();
        }
        
        function updateRegisterButton() {
            const btn = document.getElementById('registerBtn');
            btn.className = 'register-btn';
            if (state.inGame) {
                btn.classList.add('ingame');
                btn.textContent = '🎮 比赛中...';
                btn.disabled = true;
            } else if (state.userRegistered) {
                btn.classList.add('registered');
                btn.textContent = '✓ 已报名（点击取消）';
            } else {
                btn.classList.add('idle');
                btn.textContent = '🎮 立即报名';
                btn.disabled = false;
            }
        }
        
        function addHumanPlayer(name, avatar) {
            const botIndex = state.players.findIndex(p => p.type === 'bot');
            if (botIndex !== -1) {
                state.players.splice(botIndex, 1);
                state.bots--;
                state.humans++;
                state.players.unshift({
                    id: Date.now(),
                    type: 'human',
                    avatar: avatar,
                    name: name
                });
                state.lastHumanJoined = Date.now();
                renderPlayers();
                updateQueueCount();
            }
        }
        
        function removePlayerByName(name) {
            const index = state.players.findIndex(p => p.name === name);
            if (index !== -1) {
                state.players.splice(index, 1);
                state.humans--;
                if (state.players.length < CONFIG.MAX_PLAYERS) {
                    state.players.push({
                        id: Date.now(),
                        type: 'bot',
                        avatar: '🤖',
                        name: `Bot${Date.now()}`
                    });
                    state.bots++;
                }
                renderPlayers();
                updateQueueCount();
            }
        }
        
        // ============ 国家选择 ============
        function showCountries(continent) {
            const modal = document.getElementById('countryModal');
            const title = document.getElementById('countryModalTitle');
            const list = document.getElementById('countriesList');
            
            const names = { asia: '亚洲', europe: '欧洲', america: '美洲', africa: '非洲' };
            title.textContent = `选择${names[continent]}国家`;
            
            const countries = COUNTRIES[continent] || [];
            list.innerHTML = countries.map(c => `
                <div class="country-item" onclick="selectCountry('${c.code}', '${c.name}', '${c.flag}', '${c.tower}')">
                    <span class="country-flag">${c.flag}</span>
                    <div class="country-info">
                        <div class="country-name">${c.name}</div>
                        <div class="country-difficulty">${c.tower} · ${c.difficulty === 'easy' ? '简单' : c.difficulty === 'hard' ? '困难' : '普通'}</div>
                    </div>
                </div>
            `).join('');
            
            modal.classList.add('show');
        }
        
        function closeCountryModal() {
            document.getElementById('countryModal').classList.remove('show');
        }
        
        function selectCountry(code, name, flag, tower) {
            if (!state.userRegistered) {
                showNotification('❌ 请先报名！');
                return;
            }
            
            state.selectedCountry = code;
            closeCountryModal();
            
            // 启动锦标赛游戏
            startTournamentGame(code);
        }
        
        // ============ 启动锦标赛游戏 ============
        function startTournamentGame(countryCode) {
            console.log(`🎮 启动锦标赛: ${countryCode}`);
            
            // 显示游戏界面
            document.getElementById('tournamentGameContainer').classList.add('active');
            
            // 初始化游戏
            const result = initTournamentGame(countryCode, true);
            
            // 设置游戏事件监听
            setupGameEventListeners();
        }
        
        // ============ 游戏事件监听 ============
        function setupGameEventListeners() {
            if (!window.tournamentGame) return;
            
            const game = window.tournamentGame;
            
            game.on('turnTimeUpdate', (data) => {
                const timerEl = document.getElementById('turnTimerValue');
                timerEl.textContent = data.remaining;
                timerEl.classList.toggle('warning', data.remaining <= 10);
            });
            
            game.on('gameTimeUpdate', (data) => {
                document.getElementById('gameTimerValue').textContent = game.formatTime(data.remaining);
            });
            
            game.on('myTurn', () => {
                document.getElementById('turnStatus').textContent = '🎯 你的回合';
                document.getElementById('turnStatus').classList.add('my-turn');
            });
            
            game.on('turnStarted', (data) => {
                if (data.player.id !== game.state.myPlayerId) {
                    document.getElementById('turnStatus').textContent = `⏳ ${data.player.name}的回合`;
                    document.getElementById('turnStatus').classList.remove('my-turn');
                }
                updateUI();
            });
            
            game.on('cardPlayed', () => {
                updateUI();
            });
            
            game.on('logAdded', (data) => {
                addGameLog(data.message);
            });
            
            game.on('gameEnded', (data) => {
                showResultScreen(data);
            });
        }
        
        // ============ UI更新 ============
        function updateUI() {
            if (!window.tournamentGame) return;
            
            const game = window.tournamentGame;
            const myPlayer = game.getMyPlayer();
            
            // 更新手牌
            renderHand();
            
            // 更新层叠区
            renderLayerList();
            
            // 更新激怒牌
            renderProvokeList();
            
            // 更新我的信息
            document.getElementById('myLevelDisplay').textContent = `第 ${game.getLevelName(game.state.myLevel)} 层`;
            document.getElementById('roundNum').textContent = game.state.round;
            document.getElementById('handCount').textContent = `${myPlayer.cardsRemaining}张`;
            
            // 更新出牌按钮
            const playBtn = document.getElementById('playBtn');
            const isMyTurn = game.state.players[game.state.currentTurn]?.id === game.state.myPlayerId;
            const hasSelected = game.state.mySelectedCard !== null;
            playBtn.disabled = !isMyTurn || !hasSelected;
            playBtn.classList.toggle('active', isMyTurn && hasSelected);
            playBtn.textContent = isMyTurn ? (hasSelected ? '⚔️ 出牌攻击' : '请选择手牌') : '等待其他玩家...';
        }
        
        function renderHand() {
            if (!window.tournamentGame) return;
            
            const game = window.tournamentGame;
            const handCards = document.getElementById('handCards');
            const myHand = game.state.myHand.filter(c => !c.used);
            
            handCards.innerHTML = myHand.map((card, index) => {
                const isSelected = game.state.mySelectedCard === index;
                const colorClass = card.isRed ? 'red' : 'black';
                return `
                    <div class="hand-card ${colorClass} ${isSelected ? 'selected' : ''}" 
                         onclick="selectCard(${index})">
                        <span class="suit">${card.suit}</span>
                        <span class="rank">${card.rank}</span>
                        ${card.isGift ? '<span class="gift-badge">🎁</span>' : ''}
                    </div>
                `;
            }).join('');
        }
        
        function renderLayerList() {
            if (!window.tournamentGame) return;
            
            const game = window.tournamentGame;
            const layerList = document.getElementById('layerList');
            const levels = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];
            
            layerList.innerHTML = levels.map((level, index) => {
                const isCurrent = game.state.myLevel === index;
                const playersHere = game.state.players.filter(p => p.level === index);
                const playersHtml = playersHere.map(p => {
                    const isSelf = p.id === game.state.myPlayerId;
                    const teamClass = p.team === 'panda' ? 'panda-team' : 'wolf-team';
                    return `<span class="layer-player-icon ${teamClass} ${isSelf ? 'self' : ''}">${p.avatar}</span>`;
                }).join('');
                
                return `
                    <div class="layer-item ${isCurrent ? 'current' : ''}" data-rank="${level}">
                        <span class="layer-rank">${level}</span>
                        <div class="layer-players">${playersHtml}</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderProvokeList() {
            if (!window.tournamentGame) return;
            
            const game = window.tournamentGame;
            const provokeList = document.getElementById('provokeList');
            const myLevel = game.state.myLevel;
            const guard = game.state.guards[myLevel];
            
            if (!guard) return;
            
            document.getElementById('guardCardsLeft').textContent = guard.cardsLeft;
            
            provokeList.innerHTML = game.state.guards.map((g, index) => {
                const isCurrent = index === myLevel;
                const cardsHtml = g.provokeCards.map(card => {
                    const colorClass = card.isRed ? 'red' : 'black';
                    return `
                        <div class="provoke-card ${colorClass}">
                            <span class="suit">${card.suit}</span>
                            <span class="rank">${card.rank}</span>
                        </div>
                    `;
                }).join('');
                
                return `<div class="provoke-layer ${isCurrent ? 'current' : ''}">${cardsHtml}</div>`;
            }).join('');
        }
        
        // ============ 玩家操作 ============
        function selectCard(index) {
            if (!window.tournamentGame) return;
            window.tournamentGame.selectCard(index);
            updateUI();
        }
        
        function confirmPlay() {
            if (!window.tournamentGame) return;
            window.tournamentGame.confirmPlay();
            updateUI();
        }
        
        function addGameLog(message) {
            const logSection = document.getElementById('logSection');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span>${message}`;
            logSection.insertBefore(entry, logSection.firstChild);
            
            while (logSection.children.length > 10) {
                logSection.removeChild(logSection.lastChild);
            }
        }
        
        // ============ 结果界面 ============
        function showResultScreen(data) {
            const screen = document.getElementById('resultScreen');
            const leaderboardEl = document.getElementById('resultLeaderboard');
            const rewardsEl = document.getElementById('resultRewards');
            
            // 渲染排行榜
            let leaderboardHtml = '<h3>🏆 最终排名</h3>';
            data.leaderboard.slice(0, 5).forEach((player, index) => {
                const isMe = player.id === window.tournamentGame.state.myPlayerId;
                const rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                leaderboardHtml += `
                    <div class="leaderboard-item ${isMe ? 'is-me' : ''}">
                        <span class="rank rank-${index + 1}">${rankIcon}</span>
                        <span class="avatar">${player.avatar}</span>
                        <span class="name">${player.name}${isMe ? ' (我)' : ''}</span>
                        <span class="team">${player.team === 'panda' ? '🐼' : '🐺'}</span>
                    </div>
                `;
            });
            leaderboardEl.innerHTML = leaderboardHtml;
            
            // 渲染奖励
            const myRank = data.rewards.rank;
            const rankText = myRank === 1 ? '🥇 冠军' : myRank === 2 ? '🥈 亚军' : myRank === 3 ? '🥉 季军' : `第${myRank}名`;
            
            let rewardsHtml = `
                <div class="my-rank">你的排名: <span class="rank-${myRank}">${rankText}</span></div>
                <div class="rewards-list">
            `;
            
            if (data.rewards.postcard) {
                const type = data.rewards.postcard.type;
                const typeNames = { gold: '金质明信片', silver: '银质明信片', bronze: '铜质明信片' };
                rewardsHtml += `
                    <div class="reward-item postcard ${type}">
                        <span class="icon">🏛️</span>
                        <span class="name">${window.tournamentGame.state.towerData.name} ${typeNames[type]}</span>
                    </div>
                `;
            }
            
            rewardsHtml += `
                    <div class="reward-item">
                        <span class="icon">💎</span>
                        <span class="amount">${data.rewards.diamonds}</span>
                    </div>
                    <div class="reward-item">
                        <span class="icon">🪙</span>
                        <span class="amount">${data.rewards.coins.toLocaleString()}</span>
                    </div>
                </div>
                <div class="result-actions">
                    <button class="btn-share" onclick="shareResult()">📤 分享战绩</button>
                    <button class="btn-collection" onclick="viewCollection()">📔 查看明信片</button>
                    <button class="btn-again" onclick="location.reload()">🎮 再来一局</button>
                </div>
            `;
            
            rewardsEl.innerHTML = rewardsHtml;
            screen.classList.add('show');
        }
        
        function shareResult() {
            if (!window.tournamentGame) return;
            const rewards = window.tournamentGame.calculateRewards();
            const myRank = rewards.rank;
            const rankText = myRank === 1 ? '🥇 冠军' : myRank === 2 ? '🥈 亚军' : myRank === 3 ? '🥉 季军' : `第${myRank}名`;
            
            const shareText = `🏆 命运塔锦标赛\n` +
                `🗼 ${window.tournamentGame.state.towerData.name}\n` +
                `🎯 我的排名: ${rankText}\n` +
                `💎 获得钻石: ${rewards.diamonds}\n` +
                `🪙 获得金币: ${rewards.coins.toLocaleString()}`;
            
            if (navigator.share) {
                navigator.share({ title: '命运塔锦标赛战绩', text: shareText });
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(shareText).then(() => showNotification('✅ 战绩已复制'));
            }
        }
        
        function viewCollection() {
            window.location.href = 'collection.html';
        }
        
        function exitGame() {
            if (confirm('确定要退出当前游戏吗？')) {
                location.reload();
            }
        }
        
        // ============ 模拟系统 ============
        function startSimulation() {
            setInterval(() => {
                if (Math.random() > 0.7 && state.players.length < CONFIG.MAX_PLAYERS) {
                    simulatePlayerJoin();
                }
            }, CONFIG.SIMULATION_INTERVAL);
        }
        
        function simulatePlayerJoin() {
            if (state.players.length >= CONFIG.MAX_PLAYERS) return;
            const isHuman = Math.random() > 0.6;
            const newPlayer = {
                id: Date.now(),
                type: isHuman ? 'human' : 'bot',
                avatar: isHuman ? AVATARS[Math.floor(Math.random() * AVATARS.length)] : '🤖',
                name: isHuman ? `玩家${state.humans + 1}` : `Bot${state.bots + 1}`
            };
            const botIndex = state.players.findIndex(p => p.type === 'bot');
            if (isHuman && botIndex !== -1) {
                state.players.splice(botIndex, 1);
                state.bots--;
            }
            state.players.push(newPlayer);
            if (isHuman) state.humans++;
            else state.bots++;
            renderPlayers();
            updateQueueCount();
        }
        
        // ============ 通知系统 ============
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: #fff; padding: 12px 24px; border-radius: 25px;
                font-size: 14px; font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                z-index: 1000; animation: slideDown 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2500);
        }
        
        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
