<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>战令系统 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { color: #fff; text-decoration: none; font-size: 16px; }
        .header-title { color: #fff; font-size: 18px; font-weight: bold; }
        .battle-pass-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
        }
        .season-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .season-time {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 15px;
        }
        .progress-section {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
        }
        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            border-radius: 5px;
            transition: width 0.3s;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .level-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        .level-box {
            text-align: center;
        }
        .level-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .level-label {
            font-size: 12px;
            opacity: 0.8;
        }
        .upgrade-btn {
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        .rewards-section {
            padding: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rewards-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .reward-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .reward-item.locked {
            opacity: 0.5;
        }
        .reward-item.claimed {
            background: rgba(0,255,0,0.1);
        }
        .reward-level {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .reward-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,215,0,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .reward-info {
            flex: 1;
        }
        .reward-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .reward-desc {
            font-size: 12px;
            opacity: 0.7;
        }
        .reward-status {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .reward-status.claim {
            background: #4caf50;
        }
        .reward-status.locked {
            background: #666;
        }
        .reward-status.claimed {
            background: #2196f3;
        }
        .tasks-section {
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }
        .task-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .task-name {
            font-weight: bold;
        }
        .task-xp {
            color: #ffd700;
            font-size: 14px;
        }
        .task-progress {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            border-radius: 3px;
        }
        .task-progress-text {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }
    </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="responsive-layout">
    <div class="header">
        <a href="index.html" class="back-btn">← 返回</a>
        <div class="header-title">战令系统</div>
        <div></div>
    </div>
    
    <div class="battle-pass-info">
        <div class="season-title">🎯 S1赛季：首登者之战</div>
        <div class="season-time">剩余时间：28天 14小时</div>
        
        <div class="progress-section">
            <div class="progress-text">
                <span>当前等级</span>
                <span>12 / 100</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 12%"></div>
            </div>
            <div class="progress-text">
                <span>350 / 1000 XP</span>
                <span>下一级还需650 XP</span>
            </div>
        </div>
        
        <div class="level-section">
            <div class="level-box">
                <div class="level-number">12</div>
                <div class="level-label">当前等级</div>
            </div>
            <div class="level-box">
                <div class="level-number">100</div>
                <div class="level-label">最高等级</div>
            </div>
        </div>
        
        <button class="upgrade-btn">💎 解锁进阶战令</button>
    </div>
    
    <div class="tasks-section">
        <div class="section-title">📋 每日任务</div>
        
        <div class="task-item">
            <div class="task-header">
                <span class="task-name">完成3场对局</span>
                <span class="task-xp">+100 XP</span>
            </div>
            <div class="task-progress">
                <div class="task-progress-fill" style="width: 66%"></div>
            </div>
            <div class="task-progress-text">2 / 3</div>
        </div>
        
        <div class="task-item">
            <div class="task-header">
                <span class="task-name">登顶一次（到达13层）</span>
                <span class="task-xp">+200 XP</span>
            </div>
            <div class="task-progress">
                <div class="task-progress-fill" style="width: 0%"></div>
            </div>
            <div class="task-progress-text">0 / 1</div>
        </div>
        
        <div class="task-item">
            <div class="task-header">
                <span class="task-name">连胜3场</span>
                <span class="task-xp">+150 XP</span>
            </div>
            <div class="task-progress">
                <div class="task-progress-fill" style="width: 33%"></div>
            </div>
            <div class="task-progress-text">1 / 3</div>
        </div>
    </div>
    
    <div class="rewards-section">
        <div class="section-title">🎁 等级奖励</div>
        
        <div class="rewards-list">
            <div class="reward-item claimed">
                <div class="reward-level">1</div>
                <div class="reward-icon">💎</div>
                <div class="reward-info">
                    <div class="reward-name">100钻石</div>
                    <div class="reward-desc">免费版</div>
                </div>
                <div class="reward-status claimed">已领取</div>
            </div>
            
            <div class="reward-item claimed">
                <div class="reward-level">5</div>
                <div class="reward-icon">🎴</div>
                <div class="reward-info">
                    <div class="reward-name">限定卡背</div>
                    <div class="reward-desc">进阶版</div>
                </div>
                <div class="reward-status claimed">已领取</div>
            </div>
            
            <div class="reward-item">
                <div class="reward-level">10</div>
                <div class="reward-icon">👤</div>
                <div class="reward-info">
                    <div class="reward-name">专属头像框</div>
                    <div class="reward-desc">免费版</div>
                </div>
                <div class="reward-status claim">可领取</div>
            </div>
            
            <div class="reward-item locked">
                <div class="reward-level">20</div>
                <div class="reward-icon">✨</div>
                <div class="reward-info">
                    <div class="reward-name">传说特效</div>
                    <div class="reward-desc">进阶版</div>
                </div>
                <div class="reward-status locked">未解锁</div>
            </div>
            
            <div class="reward-item locked">
                <div class="reward-level">50</div>
                <div class="reward-icon">🏆</div>
                <div class="reward-info">
                    <div class="reward-name">S1赛季冠军称号</div>
                    <div class="reward-desc">进阶版</div>
                </div>
                <div class="reward-status locked">未解锁</div>
            </div>
            
            <div class="reward-item locked">
                <div class="reward-level">100</div>
                <div class="reward-icon">🐉</div>
                <div class="reward-info">
                    <div class="reward-name">神话皮肤：龙魂</div>
                    <div class="reward-desc">终极奖励</div>
                </div>
                <div class="reward-status locked">未解锁</div>
            </div>
        </div>
    </div>
</body>
</html>
