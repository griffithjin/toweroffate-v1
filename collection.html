<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 命运塔·首登者</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, rgba(26,26,62,0.8), rgba(13,27,42,0.85)),
                        url('https://raw.githubusercontent.com/griffithjin/toweroffate-v1/main/assets/towers/eiffel-tower.png') center center / cover no-repeat;
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn { color: #fff; text-decoration: none; font-size: 16px; }
        .header-title { color: #fff; font-size: 18px; font-weight: bold; }
        
        .collection-stats {
            padding: 20px;
            text-align: center;
        }
        .stats-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .stats-number {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
        }
        .stats-text {
            font-size: 14px;
            color: #aaa;
        }
        
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .postcard-item {
            aspect-ratio: 2/3;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .postcard-item:hover {
            transform: scale(1.05);
        }
        .postcard-item.locked {
            opacity: 0.5;
        }
        .postcard-item.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
        }
        .postcard-image {
            width: 100%;
            height: 70%;
            object-fit: cover;
        }
        .postcard-info {
            padding: 8px;
            text-align: center;
        }
        .postcard-country {
            font-size: 12px;
            font-weight: bold;
            color: #ffd700;
        }
        .postcard-tower {
            font-size: 10px;
            color: #aaa;
        }
        
        .reward-banner {
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            padding: 15px;
            margin: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .reward-text {
            color: #000;
            font-weight: bold;
        }
        
        .achievement-section {
            padding: 20px;
        }
        .achievement-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .achievement-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .achievement-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .achievement-info {
            flex: 1;
        }
        .achievement-name {
            font-weight: bold;
        }
        .achievement-desc {
            font-size: 12px;
            color: #aaa;
        }
        .achievement-progress {
            width: 60px;
            text-align: right;
        }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← 返回</a>
        <div class="header-title">我的收藏</div>
        <div></div>
    </div>
    
    <div class="collection-stats">
        <div class="stats-title">已收集明信片</div>
        <div class="stats-number">12/225</div>
        <div class="stats-text">完成度 5.3%</div>
    </div>
    
    <div class="reward-banner">
        <div class="reward-text">🏆 收集50张明信片解锁传说皮肤！</div>
    </div>
    
    <div class="collection-grid">
        <div class="postcard-item">
            <img src="https://raw.githubusercontent.com/griffithjin/toweroffate-v1/main/assets/towers/eiffel-tower.png" class="postcard-image">
            <div class="postcard-info">
                <div class="postcard-country">🇫🇷 法国</div>
                <div class="postcard-tower">埃菲尔铁塔</div>
            </div>
        </div>
        
        <div class="postcard-item">
            <img src="https://raw.githubusercontent.com/griffithjin/toweroffate-v1/main/assets/towers/sagrada-familia.png" class="postcard-image">
            <div class="postcard-info">
                <div class="postcard-country">🇪🇸 西班牙</div>
                <div class="postcard-tower">圣家堂</div>
            </div>
        </div>
        
        <div class="postcard-item">
            <img src="https://raw.githubusercontent.com/griffithjin/toweroffate-v1/main/assets/towers/tokyo-tower.png" class="postcard-image">
            <div class="postcard-info">
                <div class="postcard-country">🇯🇵 日本</div>
                <div class="postcard-tower">东京塔</div>
            </div>
        </div>
        
        <div class="postcard-item locked">
            <div class="postcard-info">
                <div class="postcard-country">???</div>
                <div class="postcard-tower">未解锁</div>
            </div>
        </div>
        
        <div class="postcard-item locked">
            <div class="postcard-info">
                <div class="postcard-country">???</div>
                <div class="postcard-tower">未解锁</div>
            </div>
        </div>
        
        <div class="postcard-item locked">
            <div class="postcard-info">
                <div class="postcard-country">???</div>
                <div class="postcard-tower">未解锁</div>
            </div>
        </div>
    </div>
    
    <div class="achievement-section">
        <div class="achievement-title">🏅 收集成就</div>
        
        <div class="achievement-item">
            <div class="achievement-icon">🌍</div>
            <div class="achievement-info">
                <div class="achievement-name">环球旅行家</div>
                <div class="achievement-desc">收集10个国家明信片</div>
            </div>
            <div class="achievement-progress">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 30%"></div>
                </div>
                <div style="font-size: 12px; margin-top: 5px;">3/10</div>
            </div>
        </div>
        
        <div class="achievement-item">
            <div class="achievement-icon">🏆</div>
            <div class="achievement-info">
                <div class="achievement-name">锦标赛冠军</div>
                <div class="achievement-desc">赢得5场锦标赛冠军</div>
            </div>
            <div class="achievement-progress">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 60%"></div>
                </div>
                <div style="font-size: 12px; margin-top: 5px;">3/5</div>
            </div>
        </div>
    </div>
</body>
</html>
