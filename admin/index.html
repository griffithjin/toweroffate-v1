<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运塔·首登者 - 后台管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
        }
        
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a1a3e 0%, #0d1b2a 100%);
            border-right: 1px solid rgba(255,215,0,0.2);
            padding: 20px 0;
        }
        
        .logo {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }
        
        .logo h1 {
            font-size: 20px;
            background: linear-gradient(45deg, #FFD700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .nav-menu {
            padding: 20px 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s;
            color: #888;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255,215,0,0.1);
            color: #FFD700;
            border-right: 3px solid #FFD700;
        }
        
        .nav-item .icon {
            font-size: 20px;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h2 {
            font-size: 24px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* 数据卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .stat-change.positive { color: #4CAF50; }
        .stat-change.negative { color: #f44336; }
        
        /* 图表区域 */
        .chart-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        
        .chart-card h3 {
            font-size: 16px;
            margin-bottom: 20px;
            color: #888;
        }
        
        /* 表格 */
        .table-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .table-header h3 {
            font-size: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        th {
            font-size: 12px;
            color: #888;
            font-weight: normal;
            text-transform: uppercase;
        }
        
        td {
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .status-online { background: rgba(76,175,80,0.2); color: #4CAF50; }
        .status-offline { background: rgba(158,158,158,0.2); color: #9e9e9e; }
        .status-playing { background: rgba(255,193,7,0.2); color: #FFC107; }
        .status-banned { background: rgba(244,67,54,0.2); color: #f44336; }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }
        
        .action-btn.gift {
            background: #4CAF50;
            color: #fff;
        }
        
        .action-btn.ban {
            background: #f44336;
            color: #fff;
        }
        
        /* 玩家管理 */
        .player-search {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .player-search input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .player-search input::placeholder {
            color: #666;
        }
        
        /* 测试玩家监控 */
        .test-players-panel {
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .test-players-panel h3 {
            color: #FFD700;
            margin-bottom: 15px;
        }
        
        .system-players-count {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }
        
        .count-item {
            text-align: center;
        }
        
        .count-value {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
        }
        
        .count-label {
            font-size: 12px;
            color: #888;
        }
        
        .multiply-indicator {
            font-size: 20px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🏰 命运塔</h1>
                <p>后台管理系统 V1.0</p>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </div>
                <div class="nav-item" data-page="players">
                    <span class="icon">👥</span>
                    <span>玩家管理</span>
                </div>
                <div class="nav-item" data-page="games">
                    <span class="icon">🎮</span>
                    <span>对局监控</span>
                </div>
                <div class="nav-item" data-page="shop">
                    <span class="icon">🛒</span>
                    <span>商城管理</span>
                </div>
                <div class="nav-item" data-page="tournament">
                    <span class="icon">🏆</span>
                    <span>锦标赛</span>
                </div>
                <div class="nav-item" data-page="test">
                    <span class="icon">🧪</span>
                    <span>测试管理</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </div>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 测试玩家监控面板 -->
            <div class="test-players-panel">
                <h3>🧪 测试玩家监控</h3>
                <div class="system-players-count">
                    <div class="count-item">
                        <div class="count-value" id="test-player-count">0</div>
                        <div class="count-label">测试玩家</div>
                    </div>
                    <div class="multiply-indicator">×18</div>
                    <div class="count-item">
                        <div class="count-value" id="system-player-count">0</div>
                        <div class="count-label">系统玩家</div>
                    </div>
                    <div class="count-item">
                        <div class="count-value" id="total-player-count">0</div>
                        <div class="count-label">总玩家数</div>
                    </div>
                </div>
            </div>

            <!-- 数据概览 -->
            <div class="header">
                <h2>数据概览</h2>
                <div class="header-actions">
                    <button class="btn btn-secondary">📅 今日</button>
                    <button class="btn btn-primary">🔄 刷新</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">在线玩家</div>
                    <div class="stat-value" id="online-players">1,234</div>
                    <div class="stat-change positive">↑ 12% 较昨日</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日对局</div>
                    <div class="stat-value" id="today-games">5,678</div>
                    <div class="stat-change positive">↑ 8% 较昨日</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日收入</div>
                    <div class="stat-value" id="today-revenue">¥12,345</div>
                    <div class="stat-change positive">↑ 15% 较昨日</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">付费率</div>
                    <div class="stat-value" id="pay-rate">3.2%</div>
                    <div class="stat-change negative">↓ 0.5% 较昨日</div>
                </div>
            </div>

            <!-- 玩家列表 -->
            <div class="table-container">
                <div class="table-header">
                    <h3>👥 在线玩家</h3>
                    <div class="player-search">
                        <input type="text" placeholder="搜索玩家ID/昵称..." id="player-search">
                        <button class="btn btn-primary">🔍 搜索</button>
                    </div>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>玩家ID</th>
                            <th>昵称</th>
                            <th>段位</th>
                            <th>金币</th>
                            <th>钻石</th>
                            <th>VIP</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="player-table-body">
                        <!-- 由JS动态生成 -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // 模拟数据
        let testPlayers = 0;
        let systemPlayers = 0;
        
        // 生成模拟玩家数据
        function generateMockPlayers(count) {
            const players = [];
            const ranks = ['青铜', '白银', '黄金', '铂金', '钻石', '王者'];
            const statuses = ['online', 'playing', 'offline'];
            
            for (let i = 0; i < count; i++) {
                players.push({
                    id: `player_${10000 + i}`,
                    name: `玩家${Math.floor(Math.random() * 10000)}`,
                    rank: ranks[Math.floor(Math.random() * ranks.length)],
                    coins: Math.floor(Math.random() * 50000),
                    diamonds: Math.floor(Math.random() * 1000),
                    vip: Math.random() > 0.8 ? 'VIP' : '-',
                    status: statuses[Math.floor(Math.random() * statuses.length)]
                });
            }
            return players;
        }

        // 渲染玩家表格
        function renderPlayerTable(players) {
            const tbody = document.getElementById('player-table-body');
            tbody.innerHTML = '';
            
            players.forEach(player => {
                const statusClass = {
                    'online': 'status-online',
                    'playing': 'status-playing',
                    'offline': 'status-offline'
                }[player.status];
                
                const statusText = {
                    'online': '在线',
                    'playing': '游戏中',
                    'offline': '离线'
                }[player.status];
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${player.id}</td>
                    <td>${player.name}</td>
                    <td>${player.rank}</td>
                    <td>${player.coins.toLocaleString()}</td>
                    <td>${player.diamonds}</td>
                    <td>${player.vip}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn gift">送礼</button>
                            <button class="action-btn ban">封禁</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // 更新测试玩家计数
        function updateTestPlayerCount() {
            document.getElementById('test-player-count').textContent = testPlayers;
            document.getElementById('system-player-count').textContent = systemPlayers;
            document.getElementById('total-player-count').textContent = testPlayers + systemPlayers;
        }

        // 模拟测试玩家加入
        function simulateTestPlayerJoin() {
            testPlayers++;
            systemPlayers = testPlayers * 18;
            updateTestPlayerCount();
            
            // 添加一条日志
            console.log(`测试玩家加入，当前测试玩家: ${testPlayers}, 系统玩家: ${systemPlayers}`);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 渲染初始玩家列表
            const mockPlayers = generateMockPlayers(10);
            renderPlayerTable(mockPlayers);
            
            // 更新计数
            updateTestPlayerCount();
            
            // 导航切换
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                });
            });
            
            // 每5秒模拟一个新测试玩家加入
            setInterval(() => {
                if (Math.random() > 0.7) {
                    simulateTestPlayerJoin();
                }
            }, 5000);
        });

        // 导出给外部调用
        window.adminAPI = {
            addTestPlayer: simulateTestPlayerJoin,
            getStats: () => ({
                testPlayers,
                systemPlayers,
                total: testPlayers + systemPlayers
            })
        };
    </script>
</body>
</html>
